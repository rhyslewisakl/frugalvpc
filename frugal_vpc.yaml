AWSTemplateFormatVersion: '2010-09-09'
Description: 'Frugal VPC with configurable AZ count and autoscaling NAT instances'

Parameters:
  InstanceName:
    Type: String
    Description: Name prefix for VPC resources
    Default: 'frugal-vpc'
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9-]*'
    ConstraintDescription: Must contain only alphanumeric characters and hyphens.
  
  NumberOfAZs:
    Type: Number
    Description: Number of Availability Zones (1-3)
    Default: 2
    MinValue: 1
    MaxValue: 3
    ConstraintDescription: Must be between 1 and 3
  
  UseSpotInstances:
    Type: String
    Description: Use spot instances for NAT in all AZs (cheaper but less reliable, suitable for dev environments)
    Default: 'false'
    AllowedValues: ['true', 'false']
    ConstraintDescription: Must be true or false
  
  PythonScriptUrl:
    Type: String
    Description: URL to Python script to run on NAT instances (optional)
    Default: 'data:text/plain;base64,cGFzcw=='
    ConstraintDescription: Must be a valid URL or default no-op
  
  VpcCidr:
    Type: String
    Description: CIDR block for the VPC
    Default: '10.0.0.0/16'
    AllowedPattern: '^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$'
    ConstraintDescription: Must be a valid CIDR block
  
  SubnetSize:
    Type: Number
    Description: Subnet size (CIDR suffix, e.g., 24 for /24)
    Default: 24
    MinValue: 16
    MaxValue: 28
    ConstraintDescription: Must be between 16 and 28

Mappings:
  SubnetBitsMap:
    "16": { "Bits": "16" }
    "17": { "Bits": "15" }
    "18": { "Bits": "14" }
    "19": { "Bits": "13" }
    "20": { "Bits": "12" }
    "21": { "Bits": "11" }
    "22": { "Bits": "10" }
    "23": { "Bits": "9" }
    "24": { "Bits": "8" }
    "25": { "Bits": "7" }
    "26": { "Bits": "6" }
    "27": { "Bits": "5" }
    "28": { "Bits": "4" }

Conditions:
  Create2AZ: !Or [!Equals [!Ref NumberOfAZs, 2], !Equals [!Ref NumberOfAZs, 3]]
  Create3AZ: !Equals [!Ref NumberOfAZs, 3]
  UseSpot: !Equals [!Ref UseSpotInstances, 'true']

Resources:
  # VPC and Core Networking
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public Subnets
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 6, !FindInMap [SubnetBitsMap, !Ref SubnetSize, Bits]]]
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Condition: Create2AZ
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 6, !FindInMap [SubnetBitsMap, !Ref SubnetSize, Bits]]]
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-public-subnet-2

  PublicSubnet3:
    Type: AWS::EC2::Subnet
    Condition: Create3AZ
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [2, !Cidr [!Ref VpcCidr, 6, !FindInMap [SubnetBitsMap, !Ref SubnetSize, Bits]]]
      AvailabilityZone: !Select [2, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-public-subnet-3

  # Private Subnets
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [3, !Cidr [!Ref VpcCidr, 6, !FindInMap [SubnetBitsMap, !Ref SubnetSize, Bits]]]
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-private-subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Condition: Create2AZ
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [4, !Cidr [!Ref VpcCidr, 6, !FindInMap [SubnetBitsMap, !Ref SubnetSize, Bits]]]
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-private-subnet-2

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Condition: Create3AZ
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Select [5, !Cidr [!Ref VpcCidr, 6, !FindInMap [SubnetBitsMap, !Ref SubnetSize, Bits]]]
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-private-subnet-3

  # Route Tables
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: Create2AZ
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: Create3AZ
    Properties:
      SubnetId: !Ref PublicSubnet3
      RouteTableId: !Ref PublicRouteTable

  # Private Route Tables (one per AZ)
  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-${AWS::StackName}-private-rt-a

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Condition: Create2AZ
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-${AWS::StackName}-private-rt-b

  PrivateRouteTable3:
    Type: AWS::EC2::RouteTable
    Condition: Create3AZ
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-${AWS::StackName}-private-rt-c

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: Create2AZ
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  PrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: Create3AZ
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable3



  # NAT Instance Security Group
  NATInstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for NAT instances
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 10.0.0.0/16
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${InstanceName}-nat-sg

  # IAM Role for NAT Instances
  NATInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: ModifyInstanceAttribute
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:ModifyInstanceAttribute
                Resource: '*'
                Condition:
                  StringEquals:
                    'ec2:ResourceTag/Role': 'NAT-Instance'
              - Effect: Allow
                Action:
                  - ec2:DescribeTags
                Resource: '*'
                Condition:
                  StringEquals:
                    'ec2:ResourceTag/Role': 'NAT-Instance'
              - Effect: Allow
                Action:
                  - ec2:DescribeTags
                Resource: '*'

  NATInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref NATInstanceRole

  # Launch Template for On-Demand NAT Instances
  NATLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${InstanceName}-${AWS::StackName}-nat-template
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-arm64}}'
        InstanceType: t4g.nano
        IamInstanceProfile:
          Arn: !GetAtt NATInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref NATInstanceSecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install iptables-services python3 dnf-automatic -y
            sed -i 's/upgrade_type = default/upgrade_type = security/' /etc/dnf/automatic.conf
            sed -i 's/apply_updates = no/apply_updates = yes/' /etc/dnf/automatic.conf
            systemctl enable --now dnf-automatic.timer
            systemctl enable iptables
            systemctl start iptables
            echo 'net.ipv4.ip_forward = 1' >> /etc/sysctl.conf
            sysctl -p
            INTERFACE=$(ip route | grep default | awk '{print $5}' | head -n1)
            iptables -t nat -A POSTROUTING -o $INTERFACE -j MASQUERADE
            iptables -F FORWARD
            service iptables save
            
            # Wait for Role tag and disable source/destination check
            echo "Getting instance ID..." >> /var/log/nat-setup.log
            # Try IMDSv2 first, then fallback to IMDSv1
            TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" -s 2>>/var/log/nat-setup.log)
            if [ -n "$TOKEN" ]; then
              echo "Using IMDSv2" >> /var/log/nat-setup.log
                          curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id >> /var/log/nat-setup.log 2>&1
            else
              echo "Using IMDSv1" >> /var/log/nat-setup.log
              curl -s http://169.254.169.254/latest/meta-data/instance-id >> /var/log/nat-setup.log 2>&1
            fi
            if [ -n "$TOKEN" ]; then
              INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id 2>>/var/log/nat-setup.log)
            else
              INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>>/var/log/nat-setup.log)
            fi
            echo "" >> /var/log/nat-setup.log
            echo "Instance ID: $INSTANCE_ID" >> /var/log/nat-setup.log
            if [ -z "$INSTANCE_ID" ]; then
              echo "ERROR: Failed to get instance ID" >> /var/log/nat-setup.log
              exit 1
            fi
            echo "Starting tag check loop..." >> /var/log/nat-setup.log
            while true; do
              echo "Checking for Role tag..." >> /var/log/nat-setup.log
              TAG_VALUE=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$INSTANCE_ID" "Name=key,Values=Role" --query 'Tags[0].Value' --output text --region ${AWS::Region} 2>>/var/log/nat-setup.log)
              echo "Tag value returned: '$TAG_VALUE'" >> /var/log/nat-setup.log
              if [ "$TAG_VALUE" = "NAT-Instance" ]; then
                echo "Role tag found! Disabling source/dest check..." >> /var/log/nat-setup.log
                                            aws ec2 modify-instance-attribute --instance-id $INSTANCE_ID --no-source-dest-check --region ${AWS::Region} 2>>/var/log/nat-setup.log
                echo "Source/dest check disabled" >> /var/log/nat-setup.log
                break
              fi
              echo "Tag not found, sleeping 60 seconds..." >> /var/log/nat-setup.log
              sleep 60
            done
            
            # Download and run Python script
            curl -s '${PythonScriptUrl}' -o /tmp/custom_script.py
            python3 /tmp/custom_script.py
            rm -f /tmp/custom_script.py
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${InstanceName}-nat-instance
              - Key: StackName
                Value: !Ref AWS::StackName
              - Key: Role
                Value: NAT-Instance

  # Launch Template for Spot NAT Instances
  NATSpotLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: UseSpot
    Properties:
      LaunchTemplateName: !Sub ${InstanceName}-${AWS::StackName}-nat-spot-template
      LaunchTemplateData:
        ImageId: !Sub '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-arm64}}'
        InstanceType: t4g.nano
        IamInstanceProfile:
          Arn: !GetAtt NATInstanceProfile.Arn
        SecurityGroupIds:
          - !Ref NATInstanceSecurityGroup
        InstanceMarketOptions:
          MarketType: spot
          SpotOptions:
            SpotInstanceType: one-time
            MaxPrice: '0.005'
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            yum update -y
            yum install iptables-services python3 dnf-automatic -y
            sed -i 's/upgrade_type = default/upgrade_type = security/' /etc/dnf/automatic.conf
            sed -i 's/apply_updates = no/apply_updates = yes/' /etc/dnf/automatic.conf
            systemctl enable --now dnf-automatic.timer
            systemctl enable iptables
            systemctl start iptables
            echo 'net.ipv4.ip_forward = 1' >> /etc/sysctl.conf
            sysctl -p
            INTERFACE=$(ip route | grep default | awk '{print $5}' | head -n1)
            iptables -t nat -A POSTROUTING -o $INTERFACE -j MASQUERADE
            iptables -F FORWARD
            service iptables save
            
            # Wait for Role tag and disable source/destination check
            echo "Getting instance ID..." >> /var/log/nat-setup.log
            # Try IMDSv2 first, then fallback to IMDSv1
            TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" -s 2>>/var/log/nat-setup.log)
            if [ -n "$TOKEN" ]; then
              echo "Using IMDSv2" >> /var/log/nat-setup.log
                          curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id >> /var/log/nat-setup.log 2>&1
            else
              echo "Using IMDSv1" >> /var/log/nat-setup.log
              curl -s http://169.254.169.254/latest/meta-data/instance-id >> /var/log/nat-setup.log 2>&1
            fi
            if [ -n "$TOKEN" ]; then
              INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id 2>>/var/log/nat-setup.log)
            else
              INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>>/var/log/nat-setup.log)
            fi
            echo "" >> /var/log/nat-setup.log
            echo "Instance ID: $INSTANCE_ID" >> /var/log/nat-setup.log
            if [ -z "$INSTANCE_ID" ]; then
              echo "ERROR: Failed to get instance ID" >> /var/log/nat-setup.log
              exit 1
            fi
            echo "Starting tag check loop..." >> /var/log/nat-setup.log
            while true; do
              echo "Checking for Role tag..." >> /var/log/nat-setup.log
              TAG_VALUE=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$INSTANCE_ID" "Name=key,Values=Role" --query 'Tags[0].Value' --output text --region ${AWS::Region} 2>>/var/log/nat-setup.log)
              echo "Tag value returned: '$TAG_VALUE'" >> /var/log/nat-setup.log
              if [ "$TAG_VALUE" = "NAT-Instance" ]; then
                echo "Role tag found! Disabling source/dest check..." >> /var/log/nat-setup.log
                                            aws ec2 modify-instance-attribute --instance-id $INSTANCE_ID --no-source-dest-check --region ${AWS::Region} 2>>/var/log/nat-setup.log
                echo "Source/dest check disabled" >> /var/log/nat-setup.log
                break
              fi
              echo "Tag not found, sleeping 60 seconds..." >> /var/log/nat-setup.log
              sleep 60
            done
            
            # Download and run Python script
            curl -s '${PythonScriptUrl}' -o /tmp/custom_script.py
            python3 /tmp/custom_script.py
            rm -f /tmp/custom_script.py
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${InstanceName}-nat-spot-instance
              - Key: StackName
                Value: !Ref AWS::StackName
              - Key: Role
                Value: NAT-Instance

  # Auto Scaling Groups for NAT Instances
  NATAutoScalingGroup1:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${InstanceName}-${AWS::StackName}-nat-asg-1
      VPCZoneIdentifier:
        - !Ref PublicSubnet1
      LaunchTemplate:
        LaunchTemplateId: !If [UseSpot, !Ref NATSpotLaunchTemplate, !Ref NATLaunchTemplate]
        Version: !If [UseSpot, !GetAtt NATSpotLaunchTemplate.LatestVersionNumber, !GetAtt NATLaunchTemplate.LatestVersionNumber]
      MinSize: 1
      MaxSize: 1
      DesiredCapacity: 1
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
    DependsOn:
      - RouteTableUpdaterFunction
      - InstanceStateChangeRule

  NATAutoScalingGroup2:
    Type: AWS::AutoScaling::AutoScalingGroup
    Condition: Create2AZ
    Properties:
      AutoScalingGroupName: !Sub ${InstanceName}-${AWS::StackName}-nat-asg-2
      VPCZoneIdentifier:
        - !Ref PublicSubnet2
      LaunchTemplate:
        LaunchTemplateId: !If [UseSpot, !Ref NATSpotLaunchTemplate, !Ref NATLaunchTemplate]
        Version: !If [UseSpot, !GetAtt NATSpotLaunchTemplate.LatestVersionNumber, !GetAtt NATLaunchTemplate.LatestVersionNumber]
      MinSize: 1
      MaxSize: 1
      DesiredCapacity: 1
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
    DependsOn:
      - RouteTableUpdaterFunction
      - InstanceStateChangeRule

  NATAutoScalingGroup3:
    Type: AWS::AutoScaling::AutoScalingGroup
    Condition: Create3AZ
    Properties:
      AutoScalingGroupName: !Sub ${InstanceName}-${AWS::StackName}-nat-asg-3
      VPCZoneIdentifier:
        - !Ref PublicSubnet3
      LaunchTemplate:
        LaunchTemplateId: !If [UseSpot, !Ref NATSpotLaunchTemplate, !Ref NATLaunchTemplate]
        Version: !If [UseSpot, !GetAtt NATSpotLaunchTemplate.LatestVersionNumber, !GetAtt NATLaunchTemplate.LatestVersionNumber]
      MinSize: 1
      MaxSize: 1
      DesiredCapacity: 1
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
    DependsOn:
      - RouteTableUpdaterFunction
      - InstanceStateChangeRule

  # Lambda Function for Route Table Updates
  RouteTableUpdaterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RouteTableUpdatePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeRouteTables
                  - ec2:CreateRoute
                  - ec2:ReplaceRoute
                Resource: '*'

  RouteTableUpdaterFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${InstanceName}-${AWS::StackName}-route-updater
      Runtime: python3.14
      Handler: index.lambda_handler
      Role: !GetAtt RouteTableUpdaterRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import logging
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          ec2 = boto3.client('ec2')
          
          def lambda_handler(event, context):
              logger.info(f"Lambda invoked with event: {json.dumps(event)}")
              try:
                  detail = event.get('detail', {})
                  instance_id = detail.get('instance-id')
                  state = detail.get('state')
                  logger.info(f"Processing instance {instance_id} with state {state}")
                  
                  if not instance_id or state != 'running':
                      logger.info(f"Ignoring event - instance_id: {instance_id}, state: {state}")
                      return {'statusCode': 200, 'body': 'Event ignored'}
                  
                  logger.info(f"Describing instance {instance_id}")
                  response = ec2.describe_instances(InstanceIds=[instance_id])
                  instance = response['Reservations'][0]['Instances'][0]
                  
                  tags = {tag['Key']: tag['Value'] for tag in instance.get('Tags', [])}
                  logger.info(f"Instance tags: {tags}")
                  logger.info(f"Instance name from tags: {tags.get('Name', 'N/A')}, Stack name: {tags.get('StackName', 'N/A')}")
                  
                  if tags.get('Role') != 'NAT-Instance':
                      logger.info(f"Instance {instance_id} is not a NAT instance (Role: {tags.get('Role')})")
                      return {'statusCode': 200, 'body': 'Not a NAT instance'}
                  
                  az = instance['Placement']['AvailabilityZone']
                  instance_name = tags.get('Name', '').split('-nat-')[0] if '-nat-' in tags.get('Name', '') else 'frugal-vpc'
                  stack_name = tags.get('StackName', '')
                  route_table_name = f"{instance_name}-{stack_name}-private-rt-{az[-1]}"
                  logger.info(f"Looking for route table: {route_table_name} in AZ: {az} (instance_name: {instance_name}, stack_name: {stack_name})")
                  
                  rt_response = ec2.describe_route_tables(
                      Filters=[{'Name': 'tag:Name', 'Values': [route_table_name]}]
                  )
                  logger.info(f"Route table search returned {len(rt_response['RouteTables'])} results")
                  
                  if not rt_response['RouteTables']:
                      logger.error(f"Route table {route_table_name} not found")
                      return {'statusCode': 404, 'body': 'Route table not found'}
                  
                  route_table_id = rt_response['RouteTables'][0]['RouteTableId']
                  route_table = rt_response['RouteTables'][0]
                  logger.info(f"Found route table {route_table_id}, checking existing routes")
                  
                  # Check if 0.0.0.0/0 route already exists
                  existing_route = None
                  for route in route_table.get('Routes', []):
                      if route.get('DestinationCidrBlock') == '0.0.0.0/0':
                          existing_route = route
                          break
                  
                  if existing_route:
                      logger.info(f"Found existing 0.0.0.0/0 route, replacing with instance {instance_id}")
                      ec2.replace_route(
                          RouteTableId=route_table_id,
                          DestinationCidrBlock='0.0.0.0/0',
                          InstanceId=instance_id
                      )
                      logger.info(f"Successfully replaced route in {route_table_id}")
                  else:
                      logger.info(f"No existing 0.0.0.0/0 route found, creating new route to instance {instance_id}")
                      ec2.create_route(
                          RouteTableId=route_table_id,
                          DestinationCidrBlock='0.0.0.0/0',
                          InstanceId=instance_id
                      )
                      logger.info(f"Successfully created route in {route_table_id}")
                  
                  logger.info(f"Route update completed successfully for instance {instance_id}")
                  return {'statusCode': 200, 'body': 'Route updated successfully'}
                  
              except Exception as e:
                  logger.error(f"Error: {str(e)}")
                  return {'statusCode': 500, 'body': f'Error: {str(e)}'}
          


  # EventBridge Rule for Instance State Changes
  InstanceStateChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${InstanceName}-${AWS::StackName}-instance-state-rule
      Description: Trigger Lambda when NAT instances change state
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Instance State-change Notification
        detail:
          state:
            - running
      State: ENABLED
      Targets:
        - Arn: !GetAtt RouteTableUpdaterFunction.Arn
          Id: RouteTableUpdaterTarget

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RouteTableUpdaterFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt InstanceStateChangeRule.Arn

  # CloudWatch Log Groups
  VPCFlowLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /vpc/flowlogs/${InstanceName}-${AWS::StackName}
      RetentionInDays: 7

  VPCFlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess

  VPCFlowLogs:
    Type: AWS::EC2::FlowLog
    Properties:
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogsRole.Arn
      LogGroupName: !Ref VPCFlowLogsGroup
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL

  # SSM Maintenance Window for weekly patching
  PatchMaintenanceWindow:
    Type: AWS::SSM::MaintenanceWindow
    Properties:
      Name: !Sub ${InstanceName}-${AWS::StackName}-patch-window
      Schedule: cron(0 4 ? * SUN *)
      ScheduleTimezone: UTC
      Duration: 2
      Cutoff: 1
      AllowUnassociatedTargets: false

  PatchMaintenanceWindowTarget:
    Type: AWS::SSM::MaintenanceWindowTarget
    Properties:
      WindowId: !Ref PatchMaintenanceWindow
      ResourceType: INSTANCE
      Targets:
        - Key: tag:Role
          Values:
            - NAT-Instance
        - Key: tag:StackName
          Values:
            - !Ref AWS::StackName

  PatchMaintenanceWindowTask:
    Type: AWS::SSM::MaintenanceWindowTask
    Properties:
      WindowId: !Ref PatchMaintenanceWindow
      TaskType: RUN_COMMAND
      TaskArn: AWS-RunPatchBaseline
      Priority: 1
      MaxConcurrency: '1'
      MaxErrors: '1'
      Targets:
        - Key: WindowTargetIds
          Values:
            - !Ref PatchMaintenanceWindowTarget
      TaskInvocationParameters:
        MaintenanceWindowRunCommandParameters:
          Parameters:
            Operation:
              - Install
            RebootOption:
              - RebootIfNeeded

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${AWS::StackName}-VpcId

  NumberOfAZs:
    Description: Number of Availability Zones configured
    Value: !Ref NumberOfAZs

  PublicSubnets:
    Description: Public Subnet IDs
    Value: !If
      - Create3AZ
      - !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2, !Ref PublicSubnet3]]
      - !If
        - Create2AZ
        - !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]
        - !Ref PublicSubnet1

  PrivateSubnets:
    Description: Private Subnet IDs
    Value: !If
      - Create3AZ
      - !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2, !Ref PrivateSubnet3]]
      - !If
        - Create2AZ
        - !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
        - !Ref PrivateSubnet1
